# Robinhood Agentic Trading plugin — the repo's trading bot (options + equities).
#
# Deploy with scripts/sync-vps-robinhood.ps1 or the manual commands below. Services stay
# behind the `robinhood` profile so they are opt-in.
#
#   docker compose --profile robinhood up -d --build
#   docker compose --profile robinhood down --remove-orphans
#
services:
  hermes-robinhood-api:
    profiles: ["robinhood"]
    build: .
    container_name: hermes-robinhood-api
    ports:
      - "${RH_API_PUBLISH:-127.0.0.1:8810}:8810"
    volumes:
      - rh_data:/data
    env_file:
      - .env
    environment:
      RH_DATA_DIR: "/data"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8810/api/health').status==200 else 1)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  hermes-robinhood-agent:
    profiles: ["robinhood"]
    build: .
    container_name: hermes-robinhood-agent
    depends_on:
      hermes-robinhood-api:
        condition: service_started
    ports:
      # OAuth callback (use: ssh -L 53682:127.0.0.1:53682 root@<vps> during login)
      - "127.0.0.1:53682:53682"
    volumes:
      - rh_data:/data
    env_file:
      - .env
    environment:
      RH_DATA_DIR: "/data"
      RH_OAUTH_BIND_HOST: "0.0.0.0"
    command: python scripts/run_robinhood_agent.py
    restart: unless-stopped

  # Monte-Carlo-Sim → Robinhood paper bridge (co-hosted VPS only).
  # Own profile so standalone bot deployments are unaffected. Phase 1 makes
  # NO Robinhood calls: it maps MC verdict files through the safety gates
  # and writes a paper ledger to /data/mc_bridge_ledger.jsonl.
  #
  #   docker compose --profile robinhood --profile mc-bridge up -d
  #
  # MC_OUTPUTS_DIR must point at the sim's outputs directory on the host
  # (default matches the co-hosted layout).
  hermes-mc-bridge:
    profiles: ["mc-bridge"]
    build: .
    container_name: hermes-mc-bridge
    volumes:
      - rh_data:/data
      - ${MC_OUTPUTS_DIR:-/opt/monte-carlo-sim/outputs}:/mc-outputs:ro
    env_file:
      - .env
    environment:
      RH_DATA_DIR: "/data"
      MC_VERDICTS_DIRS: "/mc-outputs/verdicts:/mc-outputs/paper_verdicts"
    command: python scripts/run_mc_bridge.py
    restart: unless-stopped

volumes:
  rh_data: