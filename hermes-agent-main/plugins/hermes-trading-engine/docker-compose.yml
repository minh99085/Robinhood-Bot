# BTC 5-minute "Up or Down" pulse PAPER engine.
#
# Two services share one data volume:
#   * hermes-trading-engine — slim read-only API (health + pulse status/ledger) on :8800.
#   * hermes-training       — the pulse loop (scripts/run_btc_pulse.py), PAPER ONLY.
#
# HARD SAFETY: paper only. The loop refuses to start if any live-execution flag is set;
# there is no order-placement / wallet code path anywhere in engine/pulse.
services:
  hermes-trading-engine:
    build: .
    container_name: hermes-trading-engine
    ports:
      - "8800:8800"
    volumes:
      - hte_data:/data
    environment:
      HTE_DATA_DIR: "/data"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8800/api/health').status==200 else 1)"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  hermes-training:
    build: .
    container_name: hermes-training
    depends_on:
      - hermes-trading-engine
    volumes:
      - hte_data:/data
    # OBSERVE-ONLY TradingView webhook publish. DEFAULT = host loopback only (private; nothing
    # reachable from the internet). To receive external TradingView alerts, set in .env:
    #   TRADINGVIEW_WEBHOOK_PUBLISH=0.0.0.0:80   (and open the host firewall for that port)
    #   TRADINGVIEW_WEBHOOK_HOST=0.0.0.0         (so the in-container listener binds all ifaces)
    # The shared-secret + symbol/bot/dedupe checks still gate every alert; it stays observe-only.
    ports:
      # ALWAYS publish the listener to host loopback :8787 so `curl 127.0.0.1:8787/...` works for
      # local admin/testing on the VPS (the documented default port).
      - "127.0.0.1:8787:8787"
      # OPTIONAL public publish for external TradingView delivery. On the VPS set
      # TRADINGVIEW_WEBHOOK_PUBLISH=0.0.0.0:80 (Vultr only exposes 22/80). Default = harmless 2nd
      # loopback so the repo default never exposes anything.
      - "${TRADINGVIEW_WEBHOOK_PUBLISH:-127.0.0.1:18787}:8787"
    command: python scripts/run_btc_pulse.py
    environment:
      HTE_DATA_DIR: "/data"
      # xAI/Grok key (from the project .env) for the OFF-hot-path event-risk overlay only.
      # If absent, the overlay stays disabled (fail-open to pure quant). Never used for trading.
      XAI_API_KEY: "${XAI_API_KEY:-}"
      # Grok event-risk overlay: slow (~3 min) advisory worker that can only make the bot MORE
      # cautious — blackout new opens before imminent high-impact events + inflate sigma.
      GROK_OVERLAY_ENABLED: "${GROK_OVERLAY_ENABLED:-1}"
      GROK_OVERLAY_INTERVAL_S: "${GROK_OVERLAY_INTERVAL_S:-180}"
      GROK_OVERLAY_MAX_CALLS_PER_HOUR: "${GROK_OVERLAY_MAX_CALLS_PER_HOUR:-20}"
      # Grok signal-intelligence (OBSERVE-ONLY, off hot path): A=batch analyst over the signal-
      # learning report, B=per-signal P(up) graded vs realized move. Shared budget caps cost/rate
      # across A, B, and the overlay. Neither can place/size/bypass a trade. Default ON (needs key).
      GROK_SIGNAL_ANALYST_ENABLED: "${GROK_SIGNAL_ANALYST_ENABLED:-1}"
      GROK_SIGNAL_PREDICTOR_ENABLED: "${GROK_SIGNAL_PREDICTOR_ENABLED:-1}"
      GROK_ANALYST_INTERVAL_S: "${GROK_ANALYST_INTERVAL_S:-1800}"
      GROK_BUDGET_DAILY_USD: "${GROK_BUDGET_DAILY_USD:-5}"
      GROK_EST_USD_PER_CALL: "${GROK_EST_USD_PER_CALL:-0.02}"
      GROK_PREDICTOR_MAX_CALLS_PER_HOUR: "${GROK_PREDICTOR_MAX_CALLS_PER_HOUR:-30}"
      GROK_ANALYST_MAX_CALLS_PER_HOUR: "${GROK_ANALYST_MAX_CALLS_PER_HOUR:-4}"
      # ---- BTC 5-min pulse engine (LOOSENED quality gates; PAPER ONLY) ----
      # Loose edge/depth so it actively takes PAPER trades on btc-up-or-down-5m windows.
      # The only hard limits left are paper-only safety + don't trade a window whose open
      # we couldn't capture + don't trade into the settlement second.
      PULSE_TICK_SECONDS: "${PULSE_TICK_SECONDS:-4}"
      PULSE_SIZE_USD: "${PULSE_SIZE_USD:-5}"
      PULSE_MIN_EDGE: "${PULSE_MIN_EDGE:-0.03}"
      PULSE_EDGE_BUFFER: "${PULSE_EDGE_BUFFER:-0.01}"
      PULSE_MIN_DEPTH_USD: "${PULSE_MIN_DEPTH_USD:-1}"
      PULSE_MIN_SECONDS_TO_CLOSE: "${PULSE_MIN_SECONDS_TO_CLOSE:-4}"
      PULSE_MAX_PRICE: "${PULSE_MAX_PRICE:-0.97}"
      # Min reward-to-risk for an entry: (1-price)/price. 0=off. e.g. 0.25 skips entries above ~0.80
      # (which win < ~$1.25 per $5 risked) so one loss can't wipe ~10 tiny wins.
      PULSE_MIN_REWARD_RISK: "${PULSE_MIN_REWARD_RISK:-0}"
      PULSE_MAX_OPEN_LAG_S: "${PULSE_MAX_OPEN_LAG_S:-20}"
      PULSE_VOL_WINDOW_S: "${PULSE_VOL_WINDOW_S:-900}"
      PULSE_SETTLE_GRACE_S: "${PULSE_SETTLE_GRACE_S:-180}"
      # ---- trade-quality / expectancy gates (trade fewer, better, calibrated entries) ----
      PULSE_MIN_SECONDS_SINCE_OPEN: "${PULSE_MIN_SECONDS_SINCE_OPEN:-30}"
      PULSE_MIN_VOL_SAMPLES: "${PULSE_MIN_VOL_SAMPLES:-12}"
      PULSE_SIGMA_TRUST_FLOOR: "${PULSE_SIGMA_TRUST_FLOOR:-0.000002}"
      PULSE_BASIS_BUFFER: "${PULSE_BASIS_BUFFER:-0.02}"
      # ---- strict execution-quality gate (orderbook-reality EV after VWAP/slippage) ----
      # Every paper trade is re-priced from the live ask LADDER (VWAP), never the midpoint;
      # rejected on wide_spread / insufficient_depth / negative_ev_after_slippage /
      # too_close_to_resolution / min_size_or_tick_violation / partial_fill_risk.
      PULSE_EXEC_MAX_SPREAD: "${PULSE_EXEC_MAX_SPREAD:-0.06}"
      PULSE_EXEC_MIN_ORDER_USD: "${PULSE_EXEC_MIN_ORDER_USD:-1}"
      PULSE_EXEC_MAX_DEPTH_CONSUME_FRAC: "${PULSE_EXEC_MAX_DEPTH_CONSUME_FRAC:-0.5}"
      PULSE_EXEC_MIN_EV: "${PULSE_EXEC_MIN_EV:-0}"
      # ---- price feed (fastest available) ----
      # 'auto' uses Chainlink Data Streams (the EXACT feed this market resolves on, sub-second,
      # zero basis) when credentials are set, else the Coinbase proxy. A ~1s background sampler
      # keeps the price fresh between trade ticks. To enable the exact feed, create free
      # credentials at https://docs.chain.link/data-streams/sign-up and set the 3 vars below
      # (as Cloud Agent secrets) + the BTC/USD feed id; then set PULSE_PRICE_SOURCE=auto.
      PULSE_PRICE_SOURCE: "${PULSE_PRICE_SOURCE:-auto}"
      PULSE_PRICE_SAMPLER_INTERVAL_S: "${PULSE_PRICE_SAMPLER_INTERVAL_S:-1}"
      # ---- oracle reference model (CORRECT): Chainlink Data Streams ref price via Polymarket
      # RTDS crypto_prices_chainlink (btc/usd). Binance/Coinbase are LEAD predictors only.
      # Settlement: official Polymarket resolution first, then RTDS Chainlink open/close proxy
      # (only when the close snapshot lag is within threshold). Classic Chainlink Data Feed /
      # AggregatorV3 is rejected as a primary settlement feed.
      HERMES_ORACLE_FEED_TYPE: "${HERMES_ORACLE_FEED_TYPE:-chainlink_data_streams_refprice}"
      HERMES_ORACLE_SYMBOL: "${HERMES_ORACLE_SYMBOL:-btc/usd}"
      HERMES_FAST_FEEDS: "${HERMES_FAST_FEEDS:-binance_btcusdt,coinbase_btcusd}"
      HERMES_SETTLEMENT_SOURCE_PRIORITY: "${HERMES_SETTLEMENT_SOURCE_PRIORITY:-polymarket_resolution,rtds_chainlink_proxy}"
      HERMES_PROXY_MAX_CLOSE_LAG_S: "${HERMES_PROXY_MAX_CLOSE_LAG_S:-30}"
      HERMES_RTDS_ENABLED: "${HERMES_RTDS_ENABLED:-1}"
      # OBSERVE-ONLY EP Chan research features (Hurst regime, half-life/ADF, z-score, Kalman).
      # Logged per candidate + grouped PnL/calibration by regime/z-bucket. NEVER trades/vetoes.
      HERMES_RESEARCH_FEATURES_ENABLED: "${HERMES_RESEARCH_FEATURES_ENABLED:-1}"
      # OBSERVE-ONLY BTC Pulse Edge Signal (CEX basket momentum + Polymarket stale-price divergence
      # + orderbook pressure + pulse_edge_score). Never trades/vetoes/bypasses the gate. Kraken+
      # Bitstamp are opt-in (extra REST) to protect the hot path; Binance+Coinbase are the default.
      HERMES_EDGE_SIGNAL_ENABLED: "${HERMES_EDGE_SIGNAL_ENABLED:-1}"
      HERMES_EDGE_EXTRA_CEX_ENABLED: "${HERMES_EDGE_EXTRA_CEX_ENABLED:-0}"
      HERMES_EDGE_PROMOTION_ALLOWED: "${HERMES_EDGE_PROMOTION_ALLOWED:-0}"
      HERMES_EDGE_PROMOTION_MIN_SAMPLES: "${HERMES_EDGE_PROMOTION_MIN_SAMPLES:-50}"
      HERMES_EDGE_PROMOTION_MIN_WIN_RATE: "${HERMES_EDGE_PROMOTION_MIN_WIN_RATE:-0.80}"
      # Learned Selectivity Gate v1: reject proven-losing buckets (live evidence) between decision
      # and execution. Only makes the bot MORE selective; never trades/resizes/bypasses the gate.
      PULSE_SELECTIVITY_GATE_ENABLED: "${PULSE_SELECTIVITY_GATE_ENABLED:-1}"
      PULSE_SELECTIVITY_MIN_SAMPLES: "${PULSE_SELECTIVITY_MIN_SAMPLES:-30}"
      PULSE_SELECTIVITY_MIN_WIN_RATE: "${PULSE_SELECTIVITY_MIN_WIN_RATE:-0.52}"
      # one-sided z for the "confidently below breakeven" reject test (1.64 ~= 95%). Higher = the
      # gate must be MORE sure a bucket loses before rejecting (fewer rejects of coin-flip buckets).
      PULSE_SELECTIVITY_CONFIDENCE_Z: "${PULSE_SELECTIVITY_CONFIDENCE_Z:-1.64}"
      PULSE_SELECTIVITY_EXPLORATION_RATE: "${PULSE_SELECTIVITY_EXPLORATION_RATE:-0.05}"
      PULSE_CALIB_MIN_SAMPLES: "${PULSE_CALIB_MIN_SAMPLES:-30}"
      PULSE_CALIB_MAX_SHRINK: "${PULSE_CALIB_MAX_SHRINK:-0.5}"
      # ---- closed-loop learning: blend the bot's own calibrated edge model into the DIRECTIONAL
      # decision so it improves as it trades. PAPER ONLY. Influence is earned (ramps with sample
      # count), gated (only when calibrated), and self-disabling (drops to 0 if calibration error
      # exceeds the cap). The execution gate / paper-realism / reconciliation are UNCHANGED and
      # still veto every trade — learning can never bypass them. Default OFF.
      PULSE_LEARNING_ENABLED: "${PULSE_LEARNING_ENABLED:-0}"
      PULSE_LEARNING_MIN_SAMPLES: "${PULSE_LEARNING_MIN_SAMPLES:-60}"
      PULSE_LEARNING_MAX_WEIGHT: "${PULSE_LEARNING_MAX_WEIGHT:-0.5}"
      PULSE_LEARNING_RAMP_SAMPLES: "${PULSE_LEARNING_RAMP_SAMPLES:-300}"
      PULSE_LEARNING_MAX_CALIB_ERROR: "${PULSE_LEARNING_MAX_CALIB_ERROR:-0.15}"
      # OBSERVE-ONLY TradingView indicator webhook intake. DISABLED unless a secret is set, and
      # bound to 127.0.0.1 INSIDE this container by default (no port published here on purpose —
      # expose deliberately via SSH tunnel / authenticated reverse proxy). TradingView alerts are
      # candidate signals only; they can NEVER place/resize/bypass a paper trade or override the
      # execution gate. To receive alerts on the host, run the listener on the host loopback (or
      # add your own proxy) — topology is intentionally left unchanged.
      TRADINGVIEW_WEBHOOK_SECRET: "${TRADINGVIEW_WEBHOOK_SECRET:-}"
      TRADINGVIEW_ALLOWED_SYMBOLS: "${TRADINGVIEW_ALLOWED_SYMBOLS:-BTCUSD,INDEX:BTCUSD,BTCUSDT,BINANCE:BTCUSDT,BTC/USD,BTC,XBTUSD,BTCUSDT.P}"
      BOT_NAME: "${BOT_NAME:-hermes}"
      TRADINGVIEW_BOT_NAME: "${TRADINGVIEW_BOT_NAME:-hermes}"
      TRADINGVIEW_WEBHOOK_HOST: "${TRADINGVIEW_WEBHOOK_HOST:-127.0.0.1}"
      TRADINGVIEW_WEBHOOK_PORT: "${TRADINGVIEW_WEBHOOK_PORT:-8787}"
      TRADINGVIEW_WEBHOOK_PATH: "${TRADINGVIEW_WEBHOOK_PATH:-/webhooks/tradingview}"
      TRADINGVIEW_MAX_AGE_S: "${TRADINGVIEW_MAX_AGE_S:-90}"
      # Use TradingView as the DIRECTIONAL INDICATION SIGNAL (restrict-only): trade only when a
      # fresh TradingView signal agrees with the side. Can only PREVENT trades, never force/bypass.
      PULSE_TRADINGVIEW_SIGNAL_GATE: "${PULSE_TRADINGVIEW_SIGNAL_GATE:-0}"
      # forward-return horizon (s) for learning whether EVERY TradingView signal predicted the
      # subsequent BTC move (builds the prediction from the full signal history). Observe-only.
      PULSE_TV_SIGNAL_HORIZON_S: "${PULSE_TV_SIGNAL_HORIZON_S:-300}"
      # TradingView signal-bucket promotion diagnostics (observe-only). Promotion to trading
      # authority requires this flag AND explicit wiring; default OFF.
      PULSE_TV_PROMOTION_ALLOWED: "${PULSE_TV_PROMOTION_ALLOWED:-0}"
      PULSE_TV_PROMOTION_MIN_SAMPLES: "${PULSE_TV_PROMOTION_MIN_SAMPLES:-50}"
      PULSE_TV_PROMOTION_MIN_WIN_RATE: "${PULSE_TV_PROMOTION_MIN_WIN_RATE:-0.80}"
      # TradingView CONTEXT GATE (hard prior, restrict-only): blocks proven-losing entry contexts
      # (volume spikes / noise regime / far-from-resolution) before the learned selectivity gate
      # has samples. Can only PREVENT trades; never forces/sizes/bypasses the execution gate.
      PULSE_TV_CONTEXT_GATE: "${PULSE_TV_CONTEXT_GATE:-0}"
      PULSE_TV_CONTEXT_BLOCK_VOLUME: "${PULSE_TV_CONTEXT_BLOCK_VOLUME:-spike}"
      PULSE_TV_CONTEXT_BLOCK_HURST: "${PULSE_TV_CONTEXT_BLOCK_HURST:-noise}"
      PULSE_TV_CONTEXT_MAX_TTC_S: "${PULSE_TV_CONTEXT_MAX_TTC_S:-240}"
      PULSE_TV_CONTEXT_EXPLORATION_RATE: "${PULSE_TV_CONTEXT_EXPLORATION_RATE:-0.05}"
      # Late-window high-conviction entry mode (time-decay edge). Restrict-only; edge always measured
      # observe-only. Can only PREVENT trades; never forces/sizes/bypasses the execution gate.
      PULSE_LATE_WINDOW_ENTRY: "${PULSE_LATE_WINDOW_ENTRY:-0}"
      PULSE_LATE_WINDOW_MAX_TTC_S: "${PULSE_LATE_WINDOW_MAX_TTC_S:-120}"
      PULSE_LATE_WINDOW_MIN_CONVICTION: "${PULSE_LATE_WINDOW_MIN_CONVICTION:-0.40}"
      CHAINLINK_DATA_STREAMS_API_KEY: "${CHAINLINK_DATA_STREAMS_API_KEY:-}"
      CHAINLINK_DATA_STREAMS_SECRET: "${CHAINLINK_DATA_STREAMS_SECRET:-}"
      CHAINLINK_BTC_FEED_ID: "${CHAINLINK_BTC_FEED_ID:-}"
      CHAINLINK_DATA_STREAMS_REST: "${CHAINLINK_DATA_STREAMS_REST:-https://api.dataengine.chain.link}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,sys,time; p=os.path.join(os.environ.get('HTE_DATA_DIR','/data'),'btc_pulse_status.json'); sys.exit(0 if os.path.exists(p) and (time.time()-os.path.getmtime(p))<120 else 1)\""]
      interval: 60s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped

volumes:
  hte_data:
