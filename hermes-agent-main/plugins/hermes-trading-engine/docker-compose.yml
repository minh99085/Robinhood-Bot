services:
  hermes-trading-engine:
    build: .
    container_name: hermes-trading-engine
    ports:
      - "8800:8800"
    volumes:
      - hte_data:/data
    environment:
      HTE_ENGINE_NAME: "HermesTradingEngine"
      # CANONICAL xAI key is XAI_API_KEY, interpolated from the project .env that
      # docker compose auto-loads (works on every Compose version + on Windows).
      # Put your key in .env as: XAI_API_KEY=xai-...   GROK_API_KEY is NOT required
      # (legacy optional fallback only); it is intentionally not passed here.
      XAI_API_KEY: "${XAI_API_KEY:-}"
      HTE_STARTING_BALANCE: "${HTE_STARTING_BALANCE:-500}"
      # Paper starting balance (fake money). Default $500; override any time by
      # adding HTE_STARTING_BALANCE=<amount> to your .env file.
      # PAPER_STARTING_BALANCE: "10000"   # alternative training default
      # ---- SAFE DEFAULTS (paper only; no real orders exist) ----
      # Engine always boots in PAPER. Autotrade is OFF by default; flip to "1"
      # only when you intentionally want the paper bot to open simulated trades.
      HTE_MODE: "paper"
      HTE_AUTOTRADE: "${HTE_AUTOTRADE:-1}"
      # ---- Polymarket-only PAPER training (full-throttle, PAPER ONLY) ----
      # The legacy crypto/stock pulse engine NEVER opens when POLYMARKET_ONLY_MODE
      # is set; Polymarket paper training runs in engine.training (scan -> rank ->
      # probability -> edge -> RiskEngine -> PaperBroker). No real orders ever.
      POLYMARKET_ONLY_MODE: "${POLYMARKET_ONLY_MODE:-1}"
      HTE_TRADING_UNIVERSE: "polymarket"
      DISABLE_CRYPTO_TRADING: "1"
      DISABLE_STOCK_TRADING: "1"
      DISABLE_ARBITRAGE_TRADING: "1"
      DISABLE_BTC_PULSE_TRADING: "1"     # legacy BTC pulse autotrade NEVER trades
      # ---- BTC 5-min Pulse PAPER-ONLY isolated training experiment (default OFF) ----
      # Runs beside the Polymarket campaign for fast feedback. PAPER ONLY: never
      # places a live order, never touches a wallet, never enables legacy BTC
      # autotrade, never writes the Polymarket learner. Fail-closed on unsafe flags.
      BTC_PULSE_ENABLED: "${BTC_PULSE_ENABLED:-0}"
      BTC_PULSE_PAPER_ONLY: "${BTC_PULSE_PAPER_ONLY:-1}"
      BTC_PULSE_ISOLATED_LEARNING: "${BTC_PULSE_ISOLATED_LEARNING:-1}"
      BTC_PULSE_ALLOW_TRANSFER_LEARNING: "${BTC_PULSE_ALLOW_TRANSFER_LEARNING:-0}"
      BTC_PULSE_LIVE_ENABLED: "${BTC_PULSE_LIVE_ENABLED:-0}"
      BTC_AUTOTRADE_ENABLED: "${BTC_AUTOTRADE_ENABLED:-0}"
      BTC_PULSE_TICK_SECONDS: "${BTC_PULSE_TICK_SECONDS:-30}"
      BTC_PULSE_ROUND_SECONDS: "${BTC_PULSE_ROUND_SECONDS:-300}"
      # ---- Dashboard BTC 5-min PULSE panel paper betting (default OFF) ----
      # The dashboard's "BTC 5MIN PULSE" panel is the legacy engine. Under
      # POLYMARKET_ONLY_MODE its trade path is frozen unless this PAPER-only flag
      # is set. Flip HTE_BTC_PULSE_PAPER_ENABLED=1 to let the panel place
      # simulated pulse bets (paper only; still goes through the RiskEngine and
      # daily-loss gates; never live, never a wallet).
      HTE_BTC_PULSE_PAPER_ENABLED: "${HTE_BTC_PULSE_PAPER_ENABLED:-0}"
      # Training Engine v2 mode: disabled | observe_only | paper_train (default observe_only)
      POLYMARKET_TRAINING_MODE: "${POLYMARKET_TRAINING_MODE:-observe_only}"
      # cautious | balanced | aggressive  (default: cautious)
      HTE_AGGRESSIVENESS: "cautious"
      HTE_PULSE_ROUND_SECONDS: "300"
      HTE_DAILY_LOSS_LIMIT: "0.10"
      HTE_MAX_EXPOSURE: "0.50"
      HTE_CRYPTO_SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT"
      HTE_STOCK_SYMBOLS: "AAPL,NVDA,TSLA,SPY"
      # ---- Grok intelligence layer (RESEARCH ONLY; key in .env: GROK_API_KEY or XAI_API_KEY) ----
      # Grok may research and propose; it can never execute and never sets order size.
      # Grok research layer is ON by default: GROK_BRAIN_ONLINE=1 plus
      # RESEARCH_MODE=online_paper (set in the research block below) permit live
      # xAI research calls. Grok only actually runs when GROK_API_KEY/XAI_API_KEY
      # is set in .env; with no key it stays gracefully off. Research-only either
      # way (never sizes/approves/arms/places an order).
      GROK_BRAIN_ONLINE: "${GROK_BRAIN_ONLINE:-1}"
      # GROK_API_KEY / XAI_API_KEY are interpolated from the project .env that docker
      # compose auto-loads (defined in the environment block at the top of this
      # service). Put your key in .env as XAI_API_KEY=xai-...
      GROK_MODEL: "${GROK_MODEL:-grok-4.3}"
      # grok-4.x reasons before answering; 4s reliably trips
      # "xAI The read operation timed out". 30s read budget (override as needed).
      HTE_GROK_TIMEOUT_MS: "${HTE_GROK_TIMEOUT_MS:-30000}"
      HTE_GROK_MAX_TOKENS: "2048"
      HTE_GROK_TEMPERATURE: "0.1"
      # ---- Cross-exchange arbitrage: PERMANENTLY DISABLED (DEPRECATED) ----
      # Arbitrage trading has been REMOVED in favour of Polymarket-only PAPER
      # training. These vars are inert: ARB_EXECUTION_ENABLED is ignored (the
      # disable is a hard module constant), the loop never starts, the dashboard
      # panel is hidden, and POST /api/arb/* always returns disabled.
      ARB_EXECUTION_ENABLED: "false"   # ignored — arbitrage is permanently off
      ARB_SIMULATE_OPPS: "0"           # deprecated
      # ---- Polymarket CLOB market data (Phase 2; READ-ONLY) ----
      # ON: the engine subscribes (read-only) to trending-market token ids and
      # feeds order-book freshness to the RiskEngine. This is a market-data
      # INPUT only — no orders are ever submitted from this feed.
      POLYMARKET_CLOB_ENABLED: "1"
      POLYMARKET_WS_URL: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
      POLYMARKET_CLOB_MAX_ASSETS: "20"
      POLYMARKET_CLOB_STALE_MS: "3000"
      POLYMARKET_CLOB_PERSIST_RAW: "1"
      POLYMARKET_CLOB_SUBSCRIBE_TRENDING: "1"
      # ---- Chainlink real price feed (READ-ONLY oracle input) ----
      # ON: the scanner reads live Chainlink mainnet aggregators (latestRoundData)
      # over JSON-RPC and uses them ONLY as a probability/edge input feature for
      # crypto-linked markets. Never sizes/approves/places an order; capped nudge.
      # Set CHAINLINK_RPC_URL to ANY Ethereum RPC (the public default below works
      # with no key; for higher rate limits put your own Alchemy/Infura URL in
      # .env). With no reachable RPC the layer abstains gracefully (paper-safe).
      CHAINLINK_ENABLED: "1"
      CHAINLINK_RPC_URL: "${CHAINLINK_RPC_URL:-https://ethereum-rpc.publicnode.com}"
      # ---- Adaptive Polymarket Market Universe Manager (selection only) ----
      # Scans a large catalog, filters + scores + tiers markets, and produces a
      # live watchlist + trade-candidate shortlist. It NEVER places/cancels/sizes
      # an order; the RiskEngine + paper OMS remain the only execution path, and
      # live order-book subscription stays gated by POLYMARKET_CLOB_ENABLED above.
      # Pipeline: scan 1000 -> shortlist 100 -> live-watch 80 -> trade top 20 -> hold <= 3.
      MARKET_SCAN_LIMIT: "1000"            # full catalog scan (hard max 2000)
      MARKET_SHORTLIST_LIMIT: "100"        # ranked shortlist (hard max 200)
      MARKET_LIVE_WATCHLIST_LIMIT: "80"    # Tier B size (hard max 120)
      MARKET_TRADE_CANDIDATE_LIMIT: "20"   # Tier A size (hard max 25)
      MAX_OPEN_POLYMARKET_TRADES: "3"      # default max open PM positions
      MAX_OPEN_TRADES_HARD_CAP: "8"        # absolute ceiling (paper clamps to 5)
      MIN_MARKET_LIQUIDITY_USD: "1000"
      MIN_MARKET_VOLUME_24H_USD: "500"
      MAX_ALLOWED_SPREAD: "0.04"
      MIN_TOP_OF_BOOK_DEPTH_USD: "100"
      CATALOG_REFRESH_SECONDS: "600"       # full catalog refresh cadence (paper)
      SCORE_REFRESH_SECONDS: "60"          # score refresh cadence
      # ---- Polymarket PAPER Training Engine (engine.training; PAPER ONLY) ----
      # MICRO_LIVE / production / guarded-live stay OFF for training. The
      # canonical (default-OFF) definitions live in the Phase 8-11 safety block
      # below — do NOT redefine them here (YAML rejects duplicate keys).
      # Polymarket paper-training pipeline sizes (selection only).
      POLYMARKET_CLOB_SUBSCRIBE_TRENDING_TRAINING: "1"
      POLYMARKET_USE_UNIVERSE_MANAGER: "1"
      POLYMARKET_SCAN_LIMIT: "1000"
      POLYMARKET_SHORTLIST_LIMIT: "150"
      POLYMARKET_LIVE_WATCH_LIMIT: "100"
      POLYMARKET_TRADE_CANDIDATE_LIMIT: "30"
      POLYMARKET_MAX_OPEN_TRADES: "5"
      POLYMARKET_MAX_OPEN_TRADES_HARD_CAP: "8"
      # ---- ACTIVE PAPER TRADING (PAPER ONLY) ----
      # Relaxed entry gates + an exploration budget so the paper engine
      # actually OPENS simulated trades for training/feedback (instead of
      # 0 trades). Every order still goes through TrainingRiskGate +
      # RiskEngine + PaperBroker and the hard PAPER_MAX_* caps below — no
      # real orders are ever placed. Tighten any of these to be more
      # selective.
      POLYMARKET_MIN_NET_EDGE: "0.005"
      POLYMARKET_BASE_UNCERTAINTY: "0.01"
      POLYMARKET_ALLOW_OFFLINE_STUB_TRADING: "0"
      POLYMARKET_REQUIRE_RESEARCH_OR_MODEL_EDGE: "0"
      POLYMARKET_EXPLORATION_ENABLED: "1"
      POLYMARKET_EXPLORATION_RATE: "0.5"
      POLYMARKET_EXPLORATION_MIN_EDGE: "-0.05"
      POLYMARKET_EXPLORATION_NOTIONAL_USD: "10"
      POLYMARKET_MIN_ORDER_NOTIONAL_USD: "1"
      POLYMARKET_EXPLORATION_MAX_POSITION_SIZE: "10"
      POLYMARKET_EXPLORATION_BUDGET_USD: "100"
      # v2 probability shrink + (relaxed) edge gates
      POLYMARKET_BASE_SHRINK_FACTOR: "0.25"
      POLYMARKET_MAX_SHRINK_FACTOR: "0.60"
      POLYMARKET_MIN_SHRINK_FACTOR: "0.05"
      POLYMARKET_MAX_SPREAD: "0.08"
      POLYMARKET_MIN_DEPTH_AT_PRICE: "25"
      POLYMARKET_MIN_EVIDENCE_SCORE: "0.0"
      POLYMARKET_MIN_SOURCE_COUNT: "0"
      POLYMARKET_MAX_AMBIGUITY_SCORE: "0.45"
      POLYMARKET_PAPER_FIXED_NOTIONAL_USD: "5"
      POLYMARKET_USE_KELLY_FOR_SIZE: "0"
      POLYMARKET_USE_KELLY_FOR_DIAGNOSTICS: "1"
      POLYMARKET_LEARNER_ENABLED: "1"
      POLYMARKET_MIN_BUCKET_SAMPLES: "20"
      POLYMARKET_LEARNER_EWMA_ALPHA: "0.05"
      POLYMARKET_MARKOUT_HORIZONS_SECONDS: "5,30,60,300,900,3600"
      # Paper risk limits (fail-closed). Per-order band $1..$10 (paper only).
      PAPER_MAX_ORDER_NOTIONAL_USD: "10"
      PAPER_MAX_MARKET_EXPOSURE_USD: "20"
      PAPER_MAX_TOTAL_EXPOSURE_USD: "100"
      PAPER_MAX_DAILY_LOSS_USD: "50"
      PAPER_MAX_OPEN_ORDERS: "20"
      # (PAPER_REJECT_ON_STALE_BOOK is set once in the Paper OMS block below)
      # Scan speed (separate scan loop from trade loop).
      POLYMARKET_SCAN_INTERVAL_SECONDS: "60"
      POLYMARKET_METADATA_CACHE_TTL_SECONDS: "60"
      POLYMARKET_INCREMENTAL_REFRESH: "1"
      POLYMARKET_ASYNC_SCAN: "1"
      POLYMARKET_MAX_CONCURRENT_REQUESTS: "8"
      POLYMARKET_RATE_LIMIT_SLEEP_MS: "100"
      POLYMARKET_SCAN_TIMEOUT_SECONDS: "20"
      # Recursive feedback loop.
      POLYMARKET_TRAINING_FEEDBACK_INTERVAL_SECONDS: "300"
      POLYMARKET_TRAINING_SIGNAL_MODEL: "research"
      POLYMARKET_TRAINING_FEEDBACK_ENABLED: "1"
      # ---- Paper OMS / PaperBroker (Phase 3; PAPER ONLY, no real execution) ----
      # The internal OMS routes every risk-approved order to a simulated broker.
      # Conservative fee/slippage; CLOB-backed fills when a book exists, else a
      # reference-price fallback. Prediction-market reference fills default OFF
      # (CLOB-only) so PM paper fills use real local book state.
      PAPER_MAX_FILL_DEPTH_FRACTION: "0.35"
      PAPER_TAKER_FEE_BPS: "30"
      PAPER_MAKER_FEE_BPS: "10"
      PAPER_SLIPPAGE_BPS: "25"
      PAPER_LATENCY_MS: "250"
      PAPER_ALLOW_REFERENCE_PRICE_FILLS: "0"
      # Pass-3 paper realism: reference-price ("fantasy") fills are OFF for PM so a
      # paper trade only counts as REAL executable edge if it could fill from the
      # live CLOB book. Trades with no book are rejected (or logged shadow-only),
      # NOT filled at an implied/reference price. Override to 1 only for ad-hoc
      # diagnostics — such fills never count toward readiness PnL.
      PAPER_ALLOW_PM_REFERENCE_PRICE_FILLS: "${PAPER_ALLOW_PM_REFERENCE_PRICE_FILLS:-0}"
      PAPER_RESTING_ORDER_FILL_ON_CROSS: "1"
      PAPER_REJECT_ON_STALE_BOOK: "1"
      # ---- Pass-3 strict paper execution realism (PAPER ONLY) ----
      POLYMARKET_MAX_BOOK_AGE_SEC: "20"
      POLYMARKET_REQUIRE_EXECUTABLE_ASK: "1"
      POLYMARKET_REJECT_STALE_BOOK: "1"
      POLYMARKET_REJECT_MISSING_ASK: "1"
      POLYMARKET_REJECT_OFFLINE_STUB_FILLS: "1"
      # Bregman/ABCAS bundle realism (every leg must be live-executable).
      POLYMARKET_BREGMAN_MAX_SPREAD: "0.08"
      POLYMARKET_BREGMAN_MIN_DEPTH_AT_PRICE: "25"
      POLYMARKET_BREGMAN_MAX_BOOK_AGE_SEC: "20"
      POLYMARKET_BREGMAN_MAX_AMBIGUITY_SCORE: "0.45"
      POLYMARKET_BREGMAN_REQUIRE_EXECUTABLE_ALL_LEGS: "1"
      POLYMARKET_BREGMAN_ALLOW_REFERENCE_FILLS: "0"
      PAPER_DEFAULT_TIME_IN_FORCE: "IOC"
      # ---- Deterministic replay / backtest (Phase 4; OFFLINE; no network, no Grok) ----
      # Replay is an offline CLI tool (scripts/run_replay.py). It never submits
      # live orders and never calls Grok. These are the default knobs.
      REPLAY_DEFAULT_INITIAL_CASH: "10000"
      REPLAY_DEFAULT_SEED: "42"
      REPLAY_STRATEGY_TICK_MS: "1000"
      REPLAY_EQUITY_SNAPSHOT_MS: "1000"
      REPLAY_OUTPUT_DIR: "replay_artifacts"
      # Cache-only/replay Grok is for OFFLINE replay + deterministic tests only — it
      # must NOT force normal paper training into cache-only (that blocked the live
      # advisory proof call). Defaults allow the bounded live xAI advisory proof call;
      # set these to 0/1 only for offline replay/test runs.
      REPLAY_ALLOW_GROK_NETWORK: "${REPLAY_ALLOW_GROK_NETWORK:-1}"
      REPLAY_USE_CACHED_GROK: "${REPLAY_USE_CACHED_GROK:-0}"
      REPLAY_END_OPEN_ORDER_POLICY: "cancel"
      REPLAY_MARK_TO_MARKET: "1"
      # ---- Phase 5: Grok research/probability engine (research-ONLY) ----
      # Grok may research + estimate probability. It NEVER executes, sizes, or
      # bypasses the RiskEngine. Default is ON (online_paper): live xAI research
      # when GROK_API_KEY/XAI_API_KEY is present, research-only otherwise.
      RESEARCH_MODE: "${RESEARCH_MODE:-online_paper}"   # disabled|offline_cache|online_paper|online_shadow|guarded_live_readonly
      # GROK_MODEL defined once above (Grok intelligence layer block)
      GROK_BASE_URL: "${GROK_BASE_URL:-https://api.x.ai/v1}"
      GROK_USE_RESPONSES_API: "1"
      GROK_ENABLE_WEB_SEARCH: "0"
      GROK_ENABLE_X_SEARCH: "0"
      GROK_ENABLE_FUNCTION_TOOLS: "1"
      GROK_REASONING_EFFORT: "low"
      GROK_TIMEOUT_SECONDS: "30"
      GROK_MAX_RETRIES: "2"
      GROK_STORE_RESPONSES: "0"
      RESEARCH_STORE_PROMPTS: "0"
      # Budget (fail-closed)
      RESEARCH_MAX_REQUESTS_PER_MINUTE: "6"
      RESEARCH_MAX_REQUESTS_PER_HOUR: "60"
      RESEARCH_MAX_REQUESTS_PER_DAY: "300"
      RESEARCH_MAX_REQUESTS_PER_MARKET_PER_DAY: "12"
      RESEARCH_MAX_DAILY_COST_USD: "5"
      RESEARCH_DISABLE_ON_BUDGET_EXCEEDED: "1"
      # Caching / quality gates
      RESEARCH_CACHE_TTL_SECONDS: "900"
      RESEARCH_ESTIMATE_STALE_SECONDS: "900"
      RESEARCH_MIN_SOURCE_COUNT: "2"
      RESEARCH_MIN_EVIDENCE_SCORE: "0.35"
      RESEARCH_MAX_AMBIGUITY_SCORE: "0.35"
      # Strategy integration (OFF by default — current behavior preserved)
      RESEARCH_USE_IN_STRATEGY: "0"
      RESEARCH_ALLOW_TRADE_PROPOSALS: "0"
      RESEARCH_ENSEMBLE_MARKET_WEIGHT: "0.50"
      RESEARCH_ENSEMBLE_LLM_WEIGHT: "0.30"
      RESEARCH_ENSEMBLE_MODEL_WEIGHT: "0.20"
      RESEARCH_EXTREME_PROB_CLAMP_LOW: "0.05"
      RESEARCH_EXTREME_PROB_CLAMP_HIGH: "0.95"
      # Replay uses cached estimates only; never the network unless explicitly overridden.
      REPLAY_USE_CACHED_RESEARCH: "1"
      # XAI_API_KEY / GROK_API_KEY are defined once above (Grok intelligence block);
      # provide their values via .env or secrets (NEVER committed/logged).
      # ---- Phase 6: venue-neutral layer + Kalshi (READ-ONLY market data) ----
      # No order placement / cancellation / private user channels exist. Kalshi
      # disabled by default; missing credentials degrade gracefully (Polymarket
      # keeps working). Keys are never logged, persisted, or sent to Grok.
      VENUES_ENABLED: "${VENUES_ENABLED:-polymarket}"   # e.g. "polymarket,kalshi"
      VENUE_METADATA_SYNC_INTERVAL_SECONDS: "300"
      VENUE_REQUIRE_RESOLUTION_RULES: "1"
      VENUE_MAX_SETTLEMENT_AMBIGUITY: "0.35"
      KALSHI_ENABLED: "${KALSHI_ENABLED:-0}"
      KALSHI_ENV: "${KALSHI_ENV:-demo}"   # demo | prod
      KALSHI_REST_BASE_URL: "${KALSHI_REST_BASE_URL:-}"
      KALSHI_WS_URL: "${KALSHI_WS_URL:-}"
      KALSHI_ACCESS_KEY_ID: "${KALSHI_ACCESS_KEY_ID:-}"
      KALSHI_PRIVATE_KEY_PATH: "${KALSHI_PRIVATE_KEY_PATH:-}"
      KALSHI_PRIVATE_KEY_PEM: "${KALSHI_PRIVATE_KEY_PEM:-}"
      KALSHI_PRIVATE_KEY_PASSWORD: "${KALSHI_PRIVATE_KEY_PASSWORD:-}"
      KALSHI_SYNC_OPEN_MARKETS: "1"
      KALSHI_SYNC_SERIES: "1"
      KALSHI_MARKET_STATUS_FILTER: "open"
      KALSHI_MAX_MARKETS: "100"
      KALSHI_REQUEST_TIMEOUT_SECONDS: "15"
      KALSHI_MAX_RETRIES: "2"
      KALSHI_WS_ENABLED: "${KALSHI_WS_ENABLED:-0}"
      KALSHI_WS_CHANNELS: "orderbook_delta,ticker,trade,market_lifecycle_v2"
      KALSHI_WS_MAX_MARKETS: "50"
      KALSHI_WS_STALE_MS: "3000"
      KALSHI_WS_HEARTBEAT_SECONDS: "15"
      KALSHI_WS_RECONNECT_MIN_SECONDS: "1"
      KALSHI_WS_RECONNECT_MAX_SECONDS: "60"
      KALSHI_WS_PERSIST_RAW: "1"
      KALSHI_WS_SUBSCRIBE_OPEN_MARKETS: "0"
      PAPER_ALLOW_KALSHI_REFERENCE_PRICE_FILLS: "0"
      # ---- Phase 7: shadow-mode orchestration (NO live orders) ----
      # Runs the full decision stack on live read-only data; records would-have-
      # traded decisions; simulates fills via PaperBroker; produces a readiness
      # report. NEVER submits/cancels real orders, uses a live broker, signs a
      # wallet, calls a Kalshi order endpoint, or subscribes to private channels.
      SHADOW_ENABLED: "${SHADOW_ENABLED:-0}"
      SHADOW_MODE: "shadow_live"
      SHADOW_VENUES: "${SHADOW_VENUES:-polymarket}"
      SHADOW_START_ON_BOOT: "0"
      SHADOW_DECISION_INTERVAL_MS: "5000"
      SHADOW_MAX_CANDIDATES_PER_CYCLE: "20"
      SHADOW_DEFAULT_NOTIONAL_USD: "5"
      SHADOW_MIN_EDGE_AFTER_COSTS: "0.04"
      SHADOW_MAX_STALE_MS: "3000"
      SHADOW_USE_RESEARCH: "1"
      SHADOW_ALLOW_ONLINE_RESEARCH: "0"
      SHADOW_USE_CACHED_RESEARCH: "1"
      SHADOW_MIN_DECISIONS_FOR_READINESS: "200"
      SHADOW_MIN_RUNTIME_HOURS_FOR_READINESS: "24"
      SHADOW_REQUIRED_VENUE_UPTIME_PCT: "0.98"
      SHADOW_MAX_DRAWDOWN_PCT: "0.10"
      SHADOW_OUTPUT_DIR: "shadow_artifacts"
      SHADOW_KILL_SWITCH_PATH: "./SHADOW_KILL_SWITCH"
      # ---- Phase 8: guarded-live DESIGN/DRY-RUN-ONLY skeleton ----
      # Even with GUARDED_LIVE_ENABLED=1, real execution stays DISABLED. No real
      # order submit/cancel, no live broker, no wallet signing, no Kalshi order
      # placement, no private user channels. Forbidden execution env vars are
      # rejected by the secret policy.
      GUARDED_LIVE_ENABLED: "${GUARDED_LIVE_ENABLED:-0}"
      GUARDED_LIVE_MODE: "design_only"
      GUARDED_LIVE_DRY_RUN_ONLY: "1"
      GUARDED_LIVE_REQUIRED_SHADOW_STATUS: "READY_FOR_MANUAL_REVIEW"
      GUARDED_LIVE_REQUIRED_APPROVALS: "2"
      GUARDED_LIVE_REQUIRE_TYPED_CONFIRMATION: "1"
      GUARDED_LIVE_BLOCK_NETWORK: "1"
      GUARDED_LIVE_BLOCK_SIGNING: "1"
      GUARDED_LIVE_FORBID_ORDER_ENDPOINTS: "1"
      GUARDED_LIVE_CONFORMANCE_REQUIRED: "1"
      GUARDED_LIVE_MAX_ORDER_NOTIONAL_USD: "1"
      GUARDED_LIVE_SECRET_POLICY_STRICT: "1"
      GUARDED_LIVE_KILL_SWITCH_PATH: "./GUARDED_LIVE_KILL_SWITCH"
      GLOBAL_KILL_SWITCH_PATH: "./KILL_SWITCH"
      # Phase 9 micro-live: DISABLED by default. Real submission is CLI-only,
      # one-canary-only, FOK-only, demo-only, and hard-capped to $1 in code.
      # The source build lock is a module constant (not env) and defaults False.
      MICRO_LIVE_BUILD_ENABLED: "${MICRO_LIVE_BUILD_ENABLED:-0}"
      MICRO_LIVE_ENABLED: "${MICRO_LIVE_ENABLED:-0}"
      MICRO_LIVE_ENV: "${MICRO_LIVE_ENV:-demo}"
      MICRO_LIVE_ALLOW_PRODUCTION: "${MICRO_LIVE_ALLOW_PRODUCTION:-0}"
      MICRO_LIVE_ACKNOWLEDGE_REAL_MONEY_RISK: "${MICRO_LIVE_ACKNOWLEDGE_REAL_MONEY_RISK:-}"
      MICRO_LIVE_CLI_ONLY: "${MICRO_LIVE_CLI_ONLY:-1}"
      MICRO_LIVE_ONE_ORDER_PER_TOKEN: "${MICRO_LIVE_ONE_ORDER_PER_TOKEN:-1}"
      MICRO_LIVE_MAX_ORDERS_PER_DAY: "${MICRO_LIVE_MAX_ORDERS_PER_DAY:-1}"
      MICRO_LIVE_MAX_ORDER_NOTIONAL_USD: "${MICRO_LIVE_MAX_ORDER_NOTIONAL_USD:-1}"
      MICRO_LIVE_ALLOWED_VENUES: "${MICRO_LIVE_ALLOWED_VENUES:-kalshi}"
      MICRO_LIVE_ALLOWED_ENVIRONMENTS: "${MICRO_LIVE_ALLOWED_ENVIRONMENTS:-demo}"
      MICRO_LIVE_ALLOWED_ORDER_TYPES: "${MICRO_LIVE_ALLOWED_ORDER_TYPES:-FOK}"
      MICRO_LIVE_ALLOWED_TIF: "${MICRO_LIVE_ALLOWED_TIF:-fill_or_kill}"
      MICRO_LIVE_REQUIRE_PHASE8_CONFORMANCE: "${MICRO_LIVE_REQUIRE_PHASE8_CONFORMANCE:-1}"
      MICRO_LIVE_REQUIRE_SHADOW_READY: "${MICRO_LIVE_REQUIRE_SHADOW_READY:-1}"
      MICRO_LIVE_REQUIRE_APPROVALS: "${MICRO_LIVE_REQUIRE_APPROVALS:-1}"
      MICRO_LIVE_REQUIRE_ARMING_TOKEN: "${MICRO_LIVE_REQUIRE_ARMING_TOKEN:-1}"
      MICRO_LIVE_KILL_SWITCH_PATH: "./MICRO_LIVE_KILL_SWITCH"
      KALSHI_MICRO_LIVE_ENABLED: "${KALSHI_MICRO_LIVE_ENABLED:-0}"
      KALSHI_MICRO_LIVE_ENV: "${KALSHI_MICRO_LIVE_ENV:-demo}"
      POLYMARKET_MICRO_LIVE_ENABLED: "${POLYMARKET_MICRO_LIVE_ENABLED:-0}"
      MICRO_LIVE_OUTPUT_DIR: "${MICRO_LIVE_OUTPUT_DIR:-micro_live_artifacts}"
      # Phase 10 post-canary analysis & scaling VETO. Analysis only; never scales,
      # never enables production execution, never enables autonomous live.
      POST_CANARY_ENABLED: "${POST_CANARY_ENABLED:-1}"
      POST_CANARY_AUTO_ANALYZE_AFTER_SUBMIT: "${POST_CANARY_AUTO_ANALYZE_AFTER_SUBMIT:-1}"
      POST_CANARY_REQUIRE_ANALYSIS_BEFORE_NEXT_CANARY: "${POST_CANARY_REQUIRE_ANALYSIS_BEFORE_NEXT_CANARY:-1}"
      POST_CANARY_ALLOW_READONLY_REFRESH: "${POST_CANARY_ALLOW_READONLY_REFRESH:-0}"
      POST_CANARY_MAX_SLIPPAGE_BPS: "${POST_CANARY_MAX_SLIPPAGE_BPS:-50}"
      POST_CANARY_ALLOW_PARTIAL_FILL: "${POST_CANARY_ALLOW_PARTIAL_FILL:-0}"
      POST_CANARY_MIN_CLEAN_DEMO_CANARIES_FOR_PROD_REVIEW: "${POST_CANARY_MIN_CLEAN_DEMO_CANARIES_FOR_PROD_REVIEW:-5}"
      POST_CANARY_SIZE_INCREASE_ALLOWED: "0"
      POST_CANARY_AUTONOMOUS_LIVE_ALLOWED: "0"
      POST_CANARY_PRODUCTION_CANARY_IMPLEMENTED: "0"
      POST_CANARY_OUTPUT_DIR: "${POST_CANARY_OUTPUT_DIR:-post_canary_artifacts}"
      # Phase 11 production-canary DESIGN REVIEW. Review only; never enables
      # production execution / cancellation / signing / size increase / autonomous live.
      PRODUCTION_REVIEW_ENABLED: "${PRODUCTION_REVIEW_ENABLED:-1}"
      PRODUCTION_REVIEW_ALLOW_READONLY_ACCOUNT_SNAPSHOT: "${PRODUCTION_REVIEW_ALLOW_READONLY_ACCOUNT_SNAPSHOT:-0}"
      PRODUCTION_REVIEW_ALLOW_PRODUCTION_NETWORK: "${PRODUCTION_REVIEW_ALLOW_PRODUCTION_NETWORK:-0}"
      PRODUCTION_REVIEW_MOCK_ONLY_CONFORMANCE: "${PRODUCTION_REVIEW_MOCK_ONLY_CONFORMANCE:-1}"
      PRODUCTION_REVIEW_MIN_CLEAN_DEMO_CANARIES: "${PRODUCTION_REVIEW_MIN_CLEAN_DEMO_CANARIES:-5}"
      PRODUCTION_REVIEW_MIN_RENEWED_SHADOW_HOURS: "${PRODUCTION_REVIEW_MIN_RENEWED_SHADOW_HOURS:-48}"
      PRODUCTION_REVIEW_REQUIRE_CHANGE_CONTROL: "${PRODUCTION_REVIEW_REQUIRE_CHANGE_CONTROL:-1}"
      PRODUCTION_REVIEW_ENABLE_PRODUCTION_EXECUTION: "0"
      PRODUCTION_REVIEW_ALLOW_SIZE_INCREASE: "0"
      PRODUCTION_REVIEW_ALLOW_AUTONOMOUS_LIVE: "0"
      PRODUCTION_REVIEW_ALLOW_DASHBOARD_SUBMIT: "0"
      PRODUCTION_REVIEW_ALLOW_API_SUBMIT: "0"
      PRODUCTION_REVIEW_OUTPUT_DIR: "${PRODUCTION_REVIEW_OUTPUT_DIR:-production_review_artifacts}"
      GUARDED_LIVE_OUTPUT_DIR: "guarded_live_artifacts"
      # ARB_* sizing/scan params below are DEPRECATED — arbitrage is permanently
      # disabled and never runs. Retained only for backwards compatibility.
      ARB_MIN_TRADE_USD: "25"
      ARB_MAX_TRADE_USD: "500"
      ARB_MIN_EXECUTION_NET_PCT: "0.25"
    restart: unless-stopped

  # Polymarket-only PAPER training engine (full-throttle, PAPER ONLY). Shares the
  # SAME /data volume as the dashboard so the "Polymarket Training" panel shows
  # it. Refuses to start if any live flag is detected. No real orders, no Micro
  # Live, no production execution, no live-submit path; Grok stays research-only.
  hermes-training:
    build: .
    container_name: hermes-training
    depends_on:
      - hermes-trading-engine
    volumes:
      - hte_data:/data
    environment:
      HTE_DATA_DIR: "/data"
      HTE_MODE: "paper"
      # CANONICAL xAI key via interpolation from the auto-loaded project .env
      # (Windows-safe). Put XAI_API_KEY=xai-... in .env. GROK_API_KEY is NOT required
      # and is intentionally not passed (legacy optional fallback only).
      XAI_API_KEY: "${XAI_API_KEY:-}"
      # Durable artifact dirs (ABSOLUTE, on the persisted /data volume so they
      # survive restarts AND stay visible to the dashboard). The entrypoint creates
      # + logs these at startup and verifies on-disk writes every tick.
      POLYMARKET_METRICS_DIR: "/data/metrics"
      POLYMARKET_REPORTS_DIR: "/data/reports"
      POLYMARKET_TRAINING_DATA_DIR: "/data/training"
      POLYMARKET_EVENT_STREAM_PATH: "/data/training/events.jsonl"
      POLYMARKET_ONLY_MODE: "1"
      DISABLE_BTC_PULSE_TRADING: "1"     # legacy BTC pulse autotrade NEVER trades
      # ---- BTC 5-min Pulse PAPER-ONLY isolated training experiment ----
      # This is the service that actually RUNS the training loop, so the BTC
      # Pulse env MUST live here (the dashboard service only reads status JSON).
      # Set BTC_PULSE_ENABLED=1 in your .env to unfreeze the paper experiment.
      # PAPER ONLY: never a live order, never a wallet, never legacy autotrade,
      # never writes the Polymarket learner. Fail-closed on unsafe flags.
      BTC_PULSE_ENABLED: "${BTC_PULSE_ENABLED:-0}"
      BTC_PULSE_PAPER_ONLY: "${BTC_PULSE_PAPER_ONLY:-1}"
      BTC_PULSE_ISOLATED_LEARNING: "${BTC_PULSE_ISOLATED_LEARNING:-1}"
      BTC_PULSE_ALLOW_TRANSFER_LEARNING: "${BTC_PULSE_ALLOW_TRANSFER_LEARNING:-0}"
      BTC_PULSE_LIVE_ENABLED: "${BTC_PULSE_LIVE_ENABLED:-0}"
      BTC_AUTOTRADE_ENABLED: "${BTC_AUTOTRADE_ENABLED:-0}"
      BTC_PULSE_TICK_SECONDS: "${BTC_PULSE_TICK_SECONDS:-30}"
      BTC_PULSE_ROUND_SECONDS: "${BTC_PULSE_ROUND_SECONDS:-300}"
      # ---- BTC Pulse Chainlink BTC/USD oracle gate (PAPER ONLY) ----
      # When BTC_PULSE_REQUIRE_CHAINLINK=1, BTC Pulse uses Chainlink BTC/USD as a
      # slow ANCHOR and skips paper trades when the oracle is missing/stale.
      # NOTE: the real Chainlink BTC/USD mainnet feed updates on a ~1h heartbeat
      # (or a 0.5% price move), so the freshness window MUST be hours, not
      # minutes — otherwise the anchor is "stale" almost every round and the
      # pulse never trades. Defaults match .env.example. Read-only.
      BTC_PULSE_REQUIRE_CHAINLINK: "${BTC_PULSE_REQUIRE_CHAINLINK:-1}"
      CHAINLINK_BTC_USD_HEARTBEAT_SECONDS: "${CHAINLINK_BTC_USD_HEARTBEAT_SECONDS:-3600}"
      CHAINLINK_BTC_USD_MAX_AGE_SECONDS: "${CHAINLINK_BTC_USD_MAX_AGE_SECONDS:-7200}"
      BTC_PULSE_ORACLE_DEBUG_LOG: "${BTC_PULSE_ORACLE_DEBUG_LOG:-1}"
      # ---- Fast read-only BTC spot feed (Coinbase) for the 5-min round price ----
      # Chainlink is the slow anchor; this seconds-fresh spot price gives the
      # 5-min pulse an actual move to evaluate. PAPER, read-only, no wallet/keys.
      # Default ON (key-less Coinbase). REQUIRE_FAST_PRICE stays soft so a brief
      # provider hiccup doesn't hard-block. Disagreement bound is generous
      # because the anchor is intentionally slow vs the live spot price.
      BTC_FAST_PRICE_ENABLED: "${BTC_FAST_PRICE_ENABLED:-1}"
      BTC_FAST_PRICE_PROVIDER: "${BTC_FAST_PRICE_PROVIDER:-coinbase_readonly}"
      BTC_FAST_PRICE_SYMBOL: "${BTC_FAST_PRICE_SYMBOL:-BTC-USD}"
      BTC_FAST_PRICE_MAX_AGE_SECONDS: "${BTC_FAST_PRICE_MAX_AGE_SECONDS:-10}"
      BTC_FAST_PRICE_TIMEOUT_SECONDS: "${BTC_FAST_PRICE_TIMEOUT_SECONDS:-5}"
      BTC_FAST_PRICE_MAX_RETRIES: "${BTC_FAST_PRICE_MAX_RETRIES:-2}"
      BTC_FAST_PRICE_LOG_ENABLED: "${BTC_FAST_PRICE_LOG_ENABLED:-1}"
      BTC_PULSE_REQUIRE_FAST_PRICE: "${BTC_PULSE_REQUIRE_FAST_PRICE:-0}"
      BTC_PULSE_MAX_ORACLE_DISAGREEMENT_BPS: "${BTC_PULSE_MAX_ORACLE_DISAGREEMENT_BPS:-150}"
      # ---- 100X Feedback Accelerator + AGGRESSIVE PAPER profile (PAPER ONLY) ----
      # hermes-training boots the 100X paper profit-discovery profile by DEFAULT:
      # AGGRESSIVE_PAPER_TRAINING=1 forces paper-only locks + fails closed on any
      # real-money flag (real execution stays impossible), and the Feedback
      # Accelerator speeds up LEARNING (more decisions, shadow + no-trade labels,
      # tiny capped exploration). Hard safety gates NEVER loosen; PAPER ONLY.
      # Override any of these in your .env (e.g. AGGRESSIVE_PAPER_TRAINING=0) to opt out.
      AGGRESSIVE_PAPER_TRAINING: "${AGGRESSIVE_PAPER_TRAINING:-1}"
      PAPER_PROFIT_DISCOVERY_PROFILE: "${PAPER_PROFIT_DISCOVERY_PROFILE:-1}"
      HERMES_ACCELERATED_DISCOVERY: "${HERMES_ACCELERATED_DISCOVERY:-1}"
      FEEDBACK_ACCELERATOR_ENABLED: "${FEEDBACK_ACCELERATOR_ENABLED:-1}"
      # 100X profile identity: HARD-PIN to 100 for hermes-training (NOT
      # "${...:-100}", because a project .env that sets =10 would otherwise win the
      # interpolation and the container would receive 10). This pins it for the training
      # service ONLY; it never enables live trading or loosens any gate.
      FEEDBACK_ACCELERATOR_TARGET_MULTIPLIER: "100"
      POLYMARKET_ACTIVE_LEARNING_ENABLED: "${POLYMARKET_ACTIVE_LEARNING_ENABLED:-1}"
      EXPLORATION_ENABLED: "${EXPLORATION_ENABLED:-1}"
      EXPLORATION_TINY_SIZE_ENABLED: "${EXPLORATION_TINY_SIZE_ENABLED:-1}"
      EXPLORATION_COUNTS_FOR_READINESS: "${EXPLORATION_COUNTS_FOR_READINESS:-0}"
      # SOFT tiny-exploration SELECTION gates loosened so paper trades happen faster
      # (PAPER ONLY; hard realism/risk/fill gates + the $1..$10 paper cap are NEVER
      # loosened, and live trading stays disabled).
      POLYMARKET_EXPLORATION_RATE: "${POLYMARKET_EXPLORATION_RATE:-1.0}"
      POLYMARKET_EXPLORATION_MIN_EDGE: "${POLYMARKET_EXPLORATION_MIN_EDGE:--0.15}"
      POLYMARKET_ACTIVE_LEARNING_TINY_TRADES_PER_TICK: "${POLYMARKET_ACTIVE_LEARNING_TINY_TRADES_PER_TICK:-5}"
      POLYMARKET_EXPLORATION_MAX_TRADES_PER_TICK: "${POLYMARKET_EXPLORATION_MAX_TRADES_PER_TICK:-5}"
      # PAPER order sizing band: $1 floor (no sub-$1 probes) up to a $10 ceiling. Probes
      # are sized to available book depth within [$1, $10]; never raises live risk.
      # HARD-PINNED (no ${..:-} interpolation) so a stale VPS .env can NEVER override the
      # band back to the old tiny values — same durability pattern as the 100X multiplier.
      POLYMARKET_EXPLORATION_MAX_EXPECTED_LOSS_USD: "1.0"
      POLYMARKET_EXPLORATION_NOTIONAL_USD: "10"
      POLYMARKET_EXPLORATION_MAX_POSITION_SIZE: "10"
      POLYMARKET_MIN_ORDER_NOTIONAL_USD: "1"
      PAPER_MAX_ORDER_NOTIONAL_USD: "10"
      SHADOW_DECISION_LOGGING_ENABLED: "${SHADOW_DECISION_LOGGING_ENABLED:-1}"
      NO_TRADE_LABELING_ENABLED: "${NO_TRADE_LABELING_ENABLED:-1}"
      ACTIVE_LEARNING_ENABLED: "${ACTIVE_LEARNING_ENABLED:-0}"
      BTC_PULSE_FEEDBACK_ACCELERATION_ENABLED: "${BTC_PULSE_FEEDBACK_ACCELERATION_ENABLED:-1}"
      POLYMARKET_FEEDBACK_ACCELERATION_ENABLED: "${POLYMARKET_FEEDBACK_ACCELERATION_ENABLED:-1}"
      # ---- Controlled market-news evidence scanner (PAPER ONLY; default OFF) ----
      # The bot scans/caches/timestamps/scores/sanitizes market news and gives
      # Grok a bounded read-only packet. Advisory only — never trades, never a
      # wallet. offline_cache = no network (default). live_read_only = key-less
      # Google News RSS headlines. Set NEWS_SCANNER_ENABLED=1 to turn it on.
      NEWS_SCANNER_ENABLED: "${NEWS_SCANNER_ENABLED:-0}"
      NEWS_PROVIDER_MODE: "${NEWS_PROVIDER_MODE:-offline_cache}"
      NEWS_LIVE_READ_ONLY: "${NEWS_LIVE_READ_ONLY:-1}"
      NEWS_MAX_QUERIES_PER_MARKET: "${NEWS_MAX_QUERIES_PER_MARKET:-3}"
      NEWS_MAX_ITEMS_PER_MARKET: "${NEWS_MAX_ITEMS_PER_MARKET:-8}"
      NEWS_MIN_RELEVANCE_SCORE: "${NEWS_MIN_RELEVANCE_SCORE:-0.2}"
      NEWS_MIN_SOURCE_CREDIBILITY: "${NEWS_MIN_SOURCE_CREDIBILITY:-0.4}"
      POLYMARKET_TRAINING_MODE: "${POLYMARKET_TRAINING_MODE:-paper_train}"
      POLYMARKET_CLOB_ENABLED: "1"
      # ---- Priority-1 targeted event-family completion (READ-ONLY) ----
      # ON: before Bregman grouping, the engine enumerates each scanned market's full
      # event sibling set from the public Polymarket /events/{id} endpoint and synthesizes
      # records for the MISSING siblings (token ids only — no fabricated prices) so
      # multi-outcome MECE families assemble and 1-2-leg-short families stop being rejected
      # not_exhaustive. The missing legs get REAL CLOB books from the hydrator and
      # completeness is still PROVEN by the unchanged certifier. Read-only; bounded per tick.
      FAMILY_COMPLETION_EVENT_FETCH_ENABLED: "1"
      POLYMARKET_FAMILY_COMPLETION_ENABLED: "1"
      POLYMARKET_FAMILY_COMPLETION_MAX_EVENTS_PER_TICK: "20"
      POLYMARKET_FAMILY_COMPLETION_MAX_NEW_RECORDS: "120"
      # ---- Priority-B universe widening toward LIQUIDITY (selection only) ----
      # Scan the full 2000-market cap and blend a liquidity-ordered fetch (deepest books)
      # with the volume-ranked fetch so the millions-in-liquidity markets that carry real
      # Bregman depth are actually scanned (the 2h report showed only 0.47% of the
      # volume-ranked universe cleared the depth gate). Never sizes/places an order.
      MARKET_SCAN_LIMIT: "2000"
      MARKET_LIQUIDITY_BLEND_FRACTION: "0.5"
      # ---- Priority-C maker/passive-fill model (paper-realistic; conservative) ----
      # A patient passive entry is credited with capturing this fraction of the spread vs
      # crossing it, floored at the real bid and gated to fresh/deep/tight books. Lowers
      # after-cost entry cost so more directional candidates clear the credible-edge gate.
      # Uses REAL CLOB bid/ask — never a fabricated/reference fill.
      PAPER_MAKER_CAPTURE_FRACTION: "0.3"
      # ---- Option A: size-accurate executable-depth requirement ----
      # The fixed $25 depth gate rejected ~all books for $1-$10 paper probes. Required depth
      # now scales with the ORDER notional (factor 1.0), floored at $1 and capped at $10
      # ("keep $10" = the max order). MORE realistic, not looser: depth required = the size
      # we actually fill; Bregman still sizes sets DOWN to real available depth.
      PAPER_SIZE_AWARE_DEPTH_ENABLED: "1"
      PAPER_DEPTH_REQUIREMENT_CAP_USD: "10"
      PAPER_MIN_DEPTH_FLOOR_USD: "1"
      PAPER_DEPTH_SAFETY_FACTOR: "1.0"
      # ---- Option 1: fast proxy labels (closed-loop DISCOVERY feedback) ----
      # The settlement learner only trains on final-settlement labels (days away). A
      # short-horizon proxy label (did mid move toward the model's side within the window)
      # gives the closed loop fast feedback for active-learning + telemetry within a run.
      # Flagged not-final-settlement; NEVER mutates settlement calibration. 6C OOS gate
      # remains the promotion authority.
      CLOSED_LOOP_FAST_PROXY_ENABLED: "1"
      CLOSED_LOOP_PROXY_HORIZON_S: "600"
      # ---- Option 2: broaden Grok directional coverage (research edge) ----
      # Coverage was the bottleneck: only ~4 Grok calls/hour (15-min spacing) meant
      # virtually every directional candidate defaulted to the market mid (zero edge). Raise
      # the advisory budget + tighten spacing so far more candidates get a real Grok
      # settlement probability. Grok stays ADVISORY-ONLY — it never gates/sizes/places.
      # NOTE: broad Grok coverage (high budget + news-less + tight spacing) STALLED the
      # training loop — the research signal model researches candidates LIVE in the hot path
      # and a fresh daily budget let a single tick make continuous serial ~10s Grok calls, so
      # ticks never completed (stale training file -> unhealthy). Reverted to the conservative,
      # KNOWN-HEALTHY bounded values until research is moved off the hot path (async). Grok
      # stays advisory-only.
      GROK_ADVISORY_MAX_CALLS_PER_HOUR: "4"
      GROK_ADVISORY_MIN_INTERVAL_SECONDS: "900"
      GROK_ADVISORY_MAX_CALLS_PER_RUN: "48"
      GROK_ADVISORY_REQUIRE_NEWS: "1"
      # HOT-PATH GUARD: cap LIVE Grok research calls per training tick. A live call costs
      # ~seconds; researching every uncached candidate per tick stalled the tick (stale
      # training file -> unhealthy). Uncached markets beyond the cap use cache/stub fast and
      # are researched on later ticks (coverage still grows). Keep small.
      GROK_MAX_LIVE_CALLS_PER_TICK: "6"
      # Research-CLIENT budget (the REAL coverage cap): the default $5/day cost cap was
      # exhausted after ~7 Grok calls, so coverage plateaued no matter the scheduler knobs.
      # Raise the bounded daily cost + request caps so far more directional candidates get a
      # real Grok probability. max_daily_cost_usd is the hard COST governor ($25/day) — tune
      # to your xAI budget. Still advisory-only; never trades.
      # Reverted to conservative defaults (broad coverage stalled the loop — see note above).
      RESEARCH_MAX_DAILY_COST_USD: "5"
      RESEARCH_MAX_REQUESTS_PER_MINUTE: "6"
      RESEARCH_MAX_REQUESTS_PER_HOUR: "60"
      RESEARCH_MAX_REQUESTS_PER_DAY: "300"
      RESEARCH_MAX_REQUESTS_PER_MARKET_PER_DAY: "12"
      # ---- Tier 1: backtest warm-start (PAPER / RESEARCH ONLY) ----
      # On startup, if the learner is cold, fetch resolved Polymarket markets, run the
      # walk-forward out-of-sample validation (-> metrics/backtest_validation.json), and seed
      # the learner's calibration from history so the model is calibrated from day one
      # instead of defaulting to the market mid. Point-in-time (no look-ahead); best-effort;
      # never blocks startup; never trades.
      BACKTEST_WARM_START_ENABLED: "1"
      BACKTEST_RESOLVED_LIMIT: "3000"
      BACKTEST_COST_PER_TRADE: "0.01"
      # ---- Tier 2: institutional portfolio-risk layer (PAPER ONLY; tighten-only) ----
      # Portfolio concentration limits (event/category/total exposure caps + VaR/CVaR),
      # confidence-aware fractional-Kelly sizing, and a regime aggression multiplier. Pure/
      # read-only on the hot path; can only SHRINK or block a paper trade, never enlarge one;
      # never enables live trading.
      PORTFOLIO_RISK_ENABLED: "1"
      PORTFOLIO_MAX_EVENT_EXPOSURE_FRAC: "0.20"
      PORTFOLIO_MAX_CATEGORY_EXPOSURE_FRAC: "0.40"
      PORTFOLIO_MAX_EXPOSURE_FRAC: "0.80"
      CONFIDENCE_KELLY_ENABLED: "1"
      REGIME_AWARE_SIZING_ENABLED: "1"
      # ---- Tier 4: cross-market relative-value detector (advisory/telemetry-only) ----
      # New alpha SOURCE: flags families whose prices are inconsistent (over/under-round).
      # Shadow-first — never opens a trade; surfaces RV candidates in metrics/relative_value.
      RELATIVE_VALUE_ENABLED: "1"
      RV_MIN_MISPRICING: "0.03"
      # ---- PROFIT-DISCOVERY tuning (NO hard gate loosened) ----
      # Stop the risk multipliers + learning throttle from self-suppressing discovery on the
      # BY-DESIGN tiny exploration learning cost: regime risk-off only on MATERIAL readiness
      # drawdown / loss-streak, and the learning throttle tolerates a small negative probe
      # PnL. Widen exploration BREADTH (more distinct families). All hard realism/depth/
      # spread/stale/after-cost/credible/OOS/Bregman gates remain UNCHANGED.
      REGIME_MIN_DRAWDOWN_PCT: "0.01"
      REGIME_MIN_LOSS_STREAK: "3"
      POLYMARKET_LEARNING_THROTTLE_PNL_FLOOR: "-0.05"
      POLYMARKET_EXPLORATION_MAX_PROBES_PER_EVENT_RUN: "4"
      POLYMARKET_EXPLORATION_MAX_PROBES_PER_CLUSTER_RUN: "6"
      # ---- Aggressive profit-discovery iteration (#1-#4): hard gates UNCHANGED ----
      # #3 TIGHTEN standard-exploration execution quality (stop paying for the weakest fills;
      # broad breadth now lives in the explicit relaxed-discovery lane below, not low-quality
      # standard probes).
      POLYMARKET_EXPLORATION_MIN_EXECUTION_QUALITY: "0.25"
      # #4 segregated relaxed-discovery lane: loosen ONLY the SOFT exploration tolerances
      # (spread + ambiguity) by 30% for the EXPLORATION lane, which is already EXCLUDED from
      # readiness/credible/OOS. stale-book, depth, missing-ask and all fake-fill bans stay
      # STRICT; readiness gates are untouched. Probes remain $1-$10 paper-only.
      RELAXED_DISCOVERY_ENABLED: "1"
      RELAXED_DISCOVERY_LOOSEN_PCT: "0.30"
      # ---- Tier 2 #5: maker/passive-fill SHADOW simulator (shadow-only; never trades) ----
      # Simulates resting a passive buy at the bid using real cross-tick book evolution +
      # queue model + adverse-selection markout, to prove maker fills before wiring them into
      # the OMS. Bounded shadow ledger; metrics in metrics/maker_fill_sim.json.
      MAKER_FILL_SIM_ENABLED: "1"
      MAKER_SIM_SIZE_USD: "5"
      MAKER_SIM_MAX_RESTING_TICKS: "20"
      # Research stays OFF the hot path (definitive loop-stall fix); advisory scheduler only.
      RESEARCH_HOT_PATH_LIVE: "0"
      # ---- Ongoing REAL-settlement feedback (honest calibration over time) ----
      # Resolve due final_settlement shadow labels against genuine Gamma resolutions (bounded
      # fetch/tick) and train probability calibration on REAL outcomes — so the model's
      # calibration improves from settled markets, not just the one-time warm-start. The
      # short-horizon momentum proxy is reported separately and NEVER as calibration.
      CLOSED_LOOP_SETTLEMENT_FETCH_ENABLED: "1"
      CLOSED_LOOP_SETTLEMENT_MAX_FETCHES_PER_TICK: "30"
      # ---- P2: directional readiness lane — hydrate the directional shortlist ----
      # The directional after-cost funnel proved candidates die `no_fresh_book` BEFORE edge
      # is computed (books weren't hydrated for the directional lane). Hydrate the shortlist
      # with REAL CLOB books (bounded/read-only) so the proven model edge can finally be
      # evaluated and credible positive-after-cost readiness trades can open. No gate loosened.
      POLYMARKET_DIRECTIONAL_HYDRATION_ENABLED: "1"
      POLYMARKET_DIRECTIONAL_HYDRATION_MAX_PER_TICK: "40"
      # ---- Chainlink real price feed (READ-ONLY oracle input) ----
      # Live Chainlink mainnet aggregator reads (latestRoundData over JSON-RPC),
      # used ONLY as a probability/edge input feature for crypto-linked markets.
      # Never sizes/approves/places an order. Public RPC default works key-less;
      # override CHAINLINK_RPC_URL in .env for higher rate limits. Unreachable RPC
      # => layer abstains gracefully (paper-safe).
      CHAINLINK_ENABLED: "1"
      CHAINLINK_RPC_URL: "${CHAINLINK_RPC_URL:-https://ethereum-rpc.publicnode.com}"
      RESEARCH_MODE: "${RESEARCH_MODE:-online_paper}"
      # GROK_API_KEY / XAI_API_KEY are interpolated from the auto-loaded project .env
      # (set in this service's environment block above). Put XAI_API_KEY=xai-... in .env.
      MICRO_LIVE_ENABLED: "0"
      KALSHI_MICRO_LIVE_ENABLED: "0"
      POLYMARKET_MICRO_LIVE_ENABLED: "0"
      PRODUCTION_REVIEW_ENABLE_PRODUCTION_EXECUTION: "0"
      GUARDED_LIVE_ENABLED: "0"
      # ---- ACTIVE PAPER TRADING (PAPER ONLY; PAPER_MAX_* caps still apply) ----
      # Relaxed entry gates + exploration budget so the training loop opens
      # simulated trades for feedback. No real orders ever.
      POLYMARKET_ALLOW_OFFLINE_STUB_TRADING: "0"
      POLYMARKET_REQUIRE_RESEARCH_OR_MODEL_EDGE: "0"
      PAPER_ALLOW_PM_REFERENCE_PRICE_FILLS: "0"
      POLYMARKET_MAX_BOOK_AGE_SEC: "20"
      POLYMARKET_REQUIRE_EXECUTABLE_ASK: "1"
      POLYMARKET_REJECT_STALE_BOOK: "1"
      POLYMARKET_REJECT_MISSING_ASK: "1"
      POLYMARKET_REJECT_OFFLINE_STUB_FILLS: "1"
      POLYMARKET_MIN_NET_EDGE: "0.005"
      POLYMARKET_MIN_DEPTH_AT_PRICE: "25"
      POLYMARKET_MIN_EVIDENCE_SCORE: "0.0"
      POLYMARKET_MIN_SOURCE_COUNT: "0"
      POLYMARKET_MAX_SPREAD: "0.08"
      POLYMARKET_MAX_AMBIGUITY_SCORE: "0.45"
      POLYMARKET_EXPLORATION_ENABLED: "1"
      # NOTE: POLYMARKET_EXPLORATION_RATE / _MIN_EDGE / _NOTIONAL_USD and
      # PAPER_MAX_ORDER_NOTIONAL_USD are defined exactly ONCE in the 100X profile block
      # above (loosened soft selection gates + tiny <=$2 hard cap). Do NOT redefine them
      # here — duplicate YAML mapping keys make docker compose config fail to parse.
      POLYMARKET_EXPLORATION_BUDGET_USD: "100"
      PAPER_MAX_TOTAL_EXPOSURE_USD: "100"
      PAPER_MAX_DAILY_LOSS_USD: "50"
    # BTC_PULSE_ENABLED=1 (above) unfreezes the pulse experiment on its own.
    # BTC_PULSE_CLI_FLAGS lets power users pass explicit flags too, e.g.
    #   BTC_PULSE_CLI_FLAGS="--btc-pulse --btc-pulse-tick-seconds 30"
    command: >
      python scripts/start_polymarket_paper_training.py
      --minutes 100000 --tick-seconds ${POLYMARKET_TRAINING_TICK_SECONDS:-10}
      --catalog ${POLYMARKET_TRAINING_CATALOG:-gamma}
      --realtime
      ${BTC_PULSE_CLI_FLAGS:-}
    # This service runs the TRAINING LOOP (not uvicorn), so the image's default
    # HTTP healthcheck on :8800 can never pass here. Override it to prove the
    # paper-training loop is ALIVE: polymarket_training.json must exist and have
    # been rewritten within the last 5 minutes (the loop persists it every tick).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,os,sys,time; p=os.path.join(os.environ.get('HTE_DATA_DIR','/data'),'polymarket_training.json'); sys.exit(0 if os.path.exists(p) and (time.time()-os.path.getmtime(p))<300 else 1)\""]
      interval: 60s
      timeout: 10s
      start_period: 180s
      retries: 3
    restart: unless-stopped

volumes:
  hte_data:
